<div class="socios-container">
  <mat-card class="header-card">
    <mat-card-header>
      <mat-card-title>
        <h1>Gestão de Sócios</h1>
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="actions-row">
        <button mat-raised-button color="primary" (click)="createSocio()" aria-label="Cadastrar novo sócio">
          <mat-icon aria-hidden="true">add</mat-icon>
          Novo Sócio
        </button>
      </div>

      <form [formGroup]="filterForm" class="filter-form" role="search">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Buscar por nome, CPF ou matrícula</mat-label>
          <input matInput formControlName="termo" placeholder="Digite para buscar..." aria-label="Campo de busca de sócios">
          <mat-icon matPrefix aria-hidden="true">search</mat-icon>
          <button mat-icon-button matSuffix *ngIf="filterForm.get('termo')?.value" 
                  (click)="clearFilters()" type="button" aria-label="Limpar busca">
            <mat-icon aria-hidden="true">clear</mat-icon>
          </button>
        </mat-form-field>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      <div *ngIf="loading" class="loading-container" role="status" aria-live="polite">
        <mat-spinner diameter="50" aria-label="Carregando"></mat-spinner>
      </div>

      <div *ngIf="!loading && dataSource.data.length === 0" class="empty-state" role="status">
        <mat-icon aria-hidden="true">people_outline</mat-icon>
        <p>Nenhum sócio encontrado</p>
        <button mat-raised-button color="primary" (click)="createSocio()" aria-label="Cadastrar primeiro sócio">
          Cadastrar Primeiro Sócio
        </button>
      </div>

      <div *ngIf="!loading && dataSource.data.length > 0" class="table-container">
        <table mat-table [dataSource]="dataSource" class="socios-table" role="table" aria-label="Lista de sócios">
          <!-- Matrícula Column -->
          <ng-container matColumnDef="matricula">
            <th mat-header-cell *matHeaderCellDef scope="col">Matrícula</th>
            <td mat-cell *matCellDef="let socio">{{ socio.matricula }}</td>
          </ng-container>

          <!-- Nome Column -->
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef scope="col">Nome</th>
            <td mat-cell *matCellDef="let socio">{{ socio.nome }}</td>
          </ng-container>

          <!-- CPF Column -->
          <ng-container matColumnDef="cpf">
            <th mat-header-cell *matHeaderCellDef scope="col">CPF</th>
            <td mat-cell *matCellDef="let socio">{{ formatCpf(socio.cpf) }}</td>
          </ng-container>

          <!-- Telefone Column -->
          <ng-container matColumnDef="telefone">
            <th mat-header-cell *matHeaderCellDef scope="col">Telefone</th>
            <td mat-cell *matCellDef="let socio">
              {{ socio.telefone ? formatTelefone(socio.telefone) : '-' }}
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef scope="col">Status</th>
            <td mat-cell *matCellDef="let socio">
              <span class="status-badge" [class.status-ativo]="socio.status === 'ATIVO'"
                    [class.status-inativo]="socio.status === 'INATIVO'"
                    [attr.aria-label]="'Status: ' + socio.status">
                {{ socio.status }}
              </span>
            </td>
          </ng-container>

          <!-- Ações Column -->
          <ng-container matColumnDef="acoes">
            <th mat-header-cell *matHeaderCellDef scope="col">Ações</th>
            <td mat-cell *matCellDef="let socio">
              <div class="action-buttons">
                <button mat-icon-button color="primary" 
                        (click)="viewSocio(socio)"
                        matTooltip="Visualizar"
                        [attr.aria-label]="'Visualizar sócio ' + socio.nome">
                  <mat-icon aria-hidden="true">visibility</mat-icon>
                </button>
                <button mat-icon-button color="accent" 
                        (click)="editSocio(socio)"
                        matTooltip="Editar"
                        [attr.aria-label]="'Editar sócio ' + socio.nome">
                  <mat-icon aria-hidden="true">edit</mat-icon>
                </button>
                <button mat-icon-button 
                        (click)="viewReciboHistory(socio)"
                        matTooltip="Histórico de Recibos"
                        [attr.aria-label]="'Ver histórico de recibos de ' + socio.nome">
                  <mat-icon aria-hidden="true">receipt_long</mat-icon>
                </button>
                <button mat-icon-button color="warn" 
                        (click)="deleteSocio(socio)"
                        matTooltip="Excluir"
                        [attr.aria-label]="'Excluir sócio ' + socio.nome">
                  <mat-icon aria-hidden="true">delete</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator 
          [length]="totalElements"
          [pageSize]="pageSize"
          [pageSizeOptions]="[5, 10, 25, 50]"
          (page)="onPageChange($event)"
          showFirstLastButtons
          aria-label="Paginação da lista de sócios">
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
