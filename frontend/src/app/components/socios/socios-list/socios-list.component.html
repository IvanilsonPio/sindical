<div class="socios-container">
  <mat-card class="header-card">
    <mat-card-header>
      <mat-card-title>
        <h1>Gestão de Sócios</h1>
      </mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="actions-row">
        <button mat-raised-button color="primary" (click)="createSocio()">
          <mat-icon>add</mat-icon>
          Novo Sócio
        </button>
      </div>

      <form [formGroup]="filterForm" class="filter-form">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Buscar por nome, CPF ou matrícula</mat-label>
          <input matInput formControlName="termo" placeholder="Digite para buscar...">
          <mat-icon matPrefix>search</mat-icon>
          <button mat-icon-button matSuffix *ngIf="filterForm.get('termo')?.value" 
                  (click)="clearFilters()" type="button">
            <mat-icon>clear</mat-icon>
          </button>
        </mat-form-field>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content>
      <div *ngIf="loading" class="loading-container">
        <mat-spinner diameter="50"></mat-spinner>
      </div>

      <div *ngIf="!loading && dataSource.data.length === 0" class="empty-state">
        <mat-icon>people_outline</mat-icon>
        <p>Nenhum sócio encontrado</p>
        <button mat-raised-button color="primary" (click)="createSocio()">
          Cadastrar Primeiro Sócio
        </button>
      </div>

      <div *ngIf="!loading && dataSource.data.length > 0" class="table-container">
        <table mat-table [dataSource]="dataSource" class="socios-table">
          <!-- Matrícula Column -->
          <ng-container matColumnDef="matricula">
            <th mat-header-cell *matHeaderCellDef>Matrícula</th>
            <td mat-cell *matCellDef="let socio">{{ socio.matricula }}</td>
          </ng-container>

          <!-- Nome Column -->
          <ng-container matColumnDef="nome">
            <th mat-header-cell *matHeaderCellDef>Nome</th>
            <td mat-cell *matCellDef="let socio">{{ socio.nome }}</td>
          </ng-container>

          <!-- CPF Column -->
          <ng-container matColumnDef="cpf">
            <th mat-header-cell *matHeaderCellDef>CPF</th>
            <td mat-cell *matCellDef="let socio">{{ formatCpf(socio.cpf) }}</td>
          </ng-container>

          <!-- Telefone Column -->
          <ng-container matColumnDef="telefone">
            <th mat-header-cell *matHeaderCellDef>Telefone</th>
            <td mat-cell *matCellDef="let socio">
              {{ socio.telefone ? formatTelefone(socio.telefone) : '-' }}
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let socio">
              <span class="status-badge" [class.status-ativo]="socio.status === 'ATIVO'"
                    [class.status-inativo]="socio.status === 'INATIVO'">
                {{ socio.status }}
              </span>
            </td>
          </ng-container>

          <!-- Ações Column -->
          <ng-container matColumnDef="acoes">
            <th mat-header-cell *matHeaderCellDef>Ações</th>
            <td mat-cell *matCellDef="let socio">
              <div class="action-buttons">
                <button mat-icon-button color="primary" 
                        (click)="viewSocio(socio)"
                        matTooltip="Visualizar">
                  <mat-icon>visibility</mat-icon>
                </button>
                <button mat-icon-button color="accent" 
                        (click)="editSocio(socio)"
                        matTooltip="Editar">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button 
                        (click)="viewReciboHistory(socio)"
                        matTooltip="Histórico de Recibos">
                  <mat-icon>receipt_long</mat-icon>
                </button>
                <button mat-icon-button color="warn" 
                        (click)="deleteSocio(socio)"
                        matTooltip="Excluir">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator 
          [length]="totalElements"
          [pageSize]="pageSize"
          [pageSizeOptions]="[5, 10, 25, 50]"
          (page)="onPageChange($event)"
          showFirstLastButtons>
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
