<div class="dashboard-container">
  <div class="dashboard-header">
    <h1>Bem-vindo ao Sistema de Gerenciamento</h1>
    <p class="subtitle">Selecione uma opção abaixo para começar</p>
  </div>

  <div class="cards-grid">
    <mat-card *ngFor="let card of navigationCards" class="navigation-card" (click)="navigateTo(card.route)">
      <mat-card-header>
        <div class="card-icon" [style.background-color]="card.color">
          <mat-icon>{{ card.icon }}</mat-icon>
        </div>
      </mat-card-header>
      <mat-card-content>
        <h2>{{ card.title }}</h2>
        <p>{{ card.description }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary">
          Acessar
          <mat-icon>arrow_forward</mat-icon>
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
