<div *ngIf="!isAuthenticated">
  <router-outlet></router-outlet>
</div>

<div *ngIf="isAuthenticated" class="app-container">
  <mat-toolbar color="primary" class="app-toolbar">
    <button mat-icon-button class="menu-button" (click)="sidenav.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="app-title">{{ title }}</span>
    <span class="spacer"></span>
    <span class="user-name">{{ userName }}</span>
    <button mat-icon-button (click)="logout()" matTooltip="Sair">
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>

  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #sidenav mode="side" opened class="sidenav">
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/socios" routerLinkActive="active-link">
          <mat-icon matListItemIcon>people</mat-icon>
          <span matListItemTitle>Sócios</span>
        </a>
        <a mat-list-item routerLink="/pagamentos" routerLinkActive="active-link">
          <mat-icon matListItemIcon>payment</mat-icon>
          <span matListItemTitle>Pagamentos</span>
        </a>
        <a mat-list-item routerLink="/arquivos" routerLinkActive="active-link">
          <mat-icon matListItemIcon>folder</mat-icon>
          <span matListItemTitle>Arquivos</span>
        </a>
        <a *ngIf="isAdmin" mat-list-item routerLink="/usuarios" routerLinkActive="active-link">
          <mat-icon matListItemIcon>manage_accounts</mat-icon>
          <span matListItemTitle>Usuários</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="main-content">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
