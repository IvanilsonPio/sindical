# Fly.io configuration for Sindicato Rural Backend
# Deploy: fly deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "sindicato-rural-backend"
primary_region = "gru"  # São Paulo

[build]
  dockerfile = "Dockerfile"

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  FILE_UPLOAD_DIR = "/app/uploads"
  PORT = "8080"
  JAVA_TOOL_OPTIONS = "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0 -XX:+UseSerialGC -Djava.security.egd=file:/dev/./urandom -Dspring.jmx.enabled=false"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "sindicato_uploads"
  destination = "/app/uploads"
  initial_size = "1gb"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "60s"

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "90s"
    method = "get"
    path = "/actuator/health"
