app = "sindicato-rural-backend"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  FILE_UPLOAD_DIR = "/app/uploads"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "120s"
    interval = "30s"
    method = "GET"
    path = "/actuator/health"
    timeout = "10s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "sindicato_uploads"
  destination = "/app/uploads"
  initial_size = "1gb"
