version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sindicato-postgres
    environment:
      POSTGRES_DB: sindicato_rural_dev
      POSTGRES_USER: sindicato_user
      POSTGRES_PASSWORD: sindicato_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sindicato_user -d sindicato_rural_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
